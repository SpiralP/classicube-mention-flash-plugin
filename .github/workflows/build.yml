name: build

on:
  pull_request:
    branches: [main, master, alpha, beta]
  workflow_call:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # for checkout
  id-token: write # OIDC token for Sigstore signing
  attestations: write # persist build-provenance attestations

jobs:
  linux_nix:
    # Skip when dispatched from release.yml's publish phase: the smoke
    # `build` job already validated nix against this commit minutes earlier,
    # and the nix output isn't attached to the GitHub release.
    if: ${{ github.event_name != 'workflow_dispatch' }}
    uses: SpiralP/github-reusable-workflows/.github/workflows/build.yml@dc6ebfa7a09b9267fec4b4e16664f805647ef641 # main

  windows:
    name: Build Windows ${{ matrix.config.arch }}
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        config:
          - { arch: x86_64, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: SpiralP/github-reusable-workflows/.github/actions/build-classicube-plugin@dc6ebfa7a09b9267fec4b4e16664f805647ef641 # main
        with:
          arch: ${{ matrix.config.arch }}
          target: ${{ matrix.config.target }}

  linux:
    name: Build Linux ${{ matrix.config.arch }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        config:
          - { arch: x86_64, target: x86_64-unknown-linux-gnu }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install x86_64 deps
        if: ${{ matrix.config.arch == 'x86_64' }}
        run: |
          sudo apt-get -y update
          sudo apt-get -y install pkg-config libx11-dev

      - name: Install i686 deps
        if: ${{ matrix.config.arch == 'i686' }}
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get -y update
          sudo apt-get -y install pkg-config:i386 \
            gcc-multilib g++-multilib \
            libx11-dev:i386
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"
      - uses: SpiralP/github-reusable-workflows/.github/actions/build-classicube-plugin@dc6ebfa7a09b9267fec4b4e16664f805647ef641 # main
        with:
          arch: ${{ matrix.config.arch }}
          target: ${{ matrix.config.target }}

  mac:
    # !!! disabled: x11 isn't available on macOS, flash.rs has no macOS path
    if: false
    name: Build MacOS ${{ matrix.config.arch }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        config:
          - { arch: aarch64, target: aarch64-apple-darwin }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: SpiralP/github-reusable-workflows/.github/actions/build-classicube-plugin@dc6ebfa7a09b9267fec4b4e16664f805647ef641 # main
        with:
          arch: ${{ matrix.config.arch }}
          target: ${{ matrix.config.target }}
